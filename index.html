<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover : requis pour que env(safe-area-inset-*) soit non nul sur iPhone. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Idle-RPG Manager</title>
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <!-- iOS ignore le SVG pour l'icône d'écran d'accueil : il lui faut un PNG. -->
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <meta name="theme-color" content="#17121f" />
    <!-- Nom affiché sous l'icône + lancement plein écran (sans barre Safari) à
         l'ouverture depuis l'écran d'accueil iOS. -->
    <meta name="apple-mobile-web-app-title" content="Idle-RPG" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="Commande ton escouade, explore les donjons et grimpe le classement." />
    <!-- Aperçu de partage (Open Graph / Twitter) — image en URL absolue -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Idle-RPG Manager" />
    <meta property="og:title" content="Idle-RPG Manager" />
    <meta property="og:description" content="Commande ton escouade, explore les donjons et grimpe le classement." />
    <meta property="og:url" content="https://julesgilli.github.io/Idle-RPG-Manager/" />
    <meta property="og:image" content="https://julesgilli.github.io/Idle-RPG-Manager/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Idle-RPG Manager" />
    <meta name="twitter:description" content="Commande ton escouade, explore les donjons et grimpe le classement." />
    <meta name="twitter:image" content="https://julesgilli.github.io/Idle-RPG-Manager/og-image.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
