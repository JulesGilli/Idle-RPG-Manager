<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Idle RPG Manager</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>Idle RPG Manager</h1>
      <div class="header-right">
        <span id="who"></span>
        <button id="refresh" class="ghost" title="Rafraîchir" hidden>⟳</button>
        <button id="logout" class="ghost" hidden>Déconnexion</button>
      </div>
    </header>

    <!-- Connexion -->
    <section id="login" hidden>
      <p class="muted">Connecte-toi avec ton compte du jeu.</p>
      <form id="login-form">
        <input id="email" type="email" placeholder="E-mail" autocomplete="username" required />
        <input
          id="password"
          type="password"
          placeholder="Mot de passe"
          autocomplete="current-password"
          required
        />
        <button type="submit" id="login-btn">Se connecter</button>
        <p id="login-error" class="error" hidden></p>
      </form>
    </section>

    <!-- Tableau de bord -->
    <section id="dashboard" hidden>
      <div id="loading" class="muted">Chargement…</div>
      <div id="error" class="error" hidden></div>
      <div id="content" hidden>
        <h2>⚔️ Farm</h2>
        <div id="farm"></div>
        <h2>🧭 Expéditions</h2>
        <div id="expeditions"></div>
        <h2>🏰 Donjons</h2>
        <div id="dungeons"></div>
      </div>
    </section>

    <script type="module" src="popup.js"></script>
  </body>
</html>
